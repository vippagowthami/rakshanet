services:
  - type: web
    name: RakshaNet
    env: docker
    plan: free
    region: oregon
    branch: main
    dockerfilePath: Dockerfile
    buildCommand: ''
    startCommand: ''
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: 'False'
      - key: ALLOWED_HOSTS
        value: '.onrender.com,localhost,127.0.0.1'
      - key: CSRF_TRUSTED_ORIGINS
        value: 'https://*.onrender.com,http://localhost:8000,http://127.0.0.1:8000'
      - key: CSRF_COOKIE_SECURE
        value: 'True'
      - key: SESSION_COOKIE_SECURE
        value: 'True'
      - key: SECURE_SSL_REDIRECT
        value: 'True'
      - key: SECURE_HSTS_SECONDS
        value: '31536000'
      - key: DATABASE_URL
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
